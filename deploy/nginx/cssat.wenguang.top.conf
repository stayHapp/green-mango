server {
    listen 80;
    server_name cssat.wenguang.top;

    location /.well-known/acme-challenge/ {
        root /opt/zhihui-demo/app/frontend/dist;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name cssat.wenguang.top;

    ssl_certificate /etc/letsencrypt/live/cssat.wenguang.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cssat.wenguang.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/zhihui-demo/app/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
